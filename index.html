<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Portal | Client Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 480px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .total-box { font-size: 20px; font-weight: 800; text-align: center; margin: 15px 0; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>Service Calculator</h3>
        <select id="serviceSelect" onchange="calculateTotal()">
            <option value="300">eCitizen Phone Change (300/-)</option>
            <option value="400">SHA Rate Reduction (400/-)</option>
            <option value="250">KRA Email/PIN (250/-)</option>
            <option value="500">NTSA Services (500/-)</option>
        </select>
        <div class="total-box" id="totalDisplay">Total: 300/-</div>
        <input type="text" id="clientName" placeholder="Enter Full Name">
        <button class="btn" onclick="sendWhatsApp()">Submit Order</button>
    </div>

    <div class="card">
        <h3>Order Status Portal</h3>
        <input type="text" id="trackName" placeholder="Enter Name to Track">
        <button class="btn" style="background:#2563eb;" onclick="trackStatus()">Check Status</button>
        <p id="statusResult" style="margin-top:15px; font-weight:600; text-align:center;"></p>
    </div>
</div>

<script>
    function calculateTotal() {
        const price = document.getElementById('serviceSelect').value;
        document.getElementById('totalDisplay').innerText = `Total: ${price}/-`;
    }

    function sendWhatsApp() {
        const name = document.getElementById('clientName').value;
        const service = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text;
        const total = document.getElementById('totalDisplay').innerText;
        window.open(`https://wa.me/254100733790?text=Order for ${name}. Service: ${service}. ${total}.`, '_blank');
    }

    function trackStatus() {
        const name = document.getElementById('trackName').value.toLowerCase();
        const display = document.getElementById('statusResult');
        // Simple Logic: You can expand this with a real database later
        if(name === "") { display.innerText = "Please enter a name."; }
        else { display.innerText = "Status: Processing..."; display.style.color = "#d97706"; }
    }
</script>
</body>
</html>
